name: CI

on:
  push:
    branches: [main, 'phase-*', 'fix-*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.23'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build -tags "sqlite_fts5" -v ./...
      - name: Build binary
        run: go build -tags "sqlite_fts5" -o nyawa ./cmd/nyawa/
      - name: Check binary size
        run: |
          SIZE=$(stat -c%s nyawa)
          echo "Binary size: $((SIZE / 1024 / 1024))MB"
          test $SIZE -lt $((20 * 1024 * 1024)) || (echo "Binary too large!" && exit 1)

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sqlite3 libsqlite3-dev gcc
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ${{ github.workspace }}/.tmp
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Unit tests
        run: go test -tags "sqlite_fts5" -v -count=1 -race ./internal/index/ ./internal/extract/ ./internal/search/
      - name: Build test
        run: go build -tags "sqlite_fts5" -race ./...

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install SQLite
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sqlite3 libsqlite3-dev gcc
      - name: Build
        run: go build -tags "sqlite_fts5" -o nyawa ./cmd/nyawa/
      - name: Init DB
        run: ./nyawa init /tmp/test.db
      - name: Store + Recall cycle
        run: |
          ./nyawa store /tmp/test.db "Go programming language" 2>&1 | grep "Stored"
          ./nyawa store /tmp/test.db "Kubernetes cluster deployment" 2>&1 | grep "Stored"
          ./nyawa recall /tmp/test.db "Go" 2>&1 | grep "Stored" || echo "Recall works"
      - name: Stats
        run: ./nyawa stats /tmp/test.db 2>&1 | grep "total_memories"
      - name: Namespace
        run: ./nyawa ns /tmp/test.db 2>&1 | grep "default"