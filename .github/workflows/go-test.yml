name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install SQLite
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsqlite3-dev pkg-config
      - name: Build
        run: go build -tags "sqlite_fts5" -o nyawa ./cmd/nyawa/ 2>&1
      - name: Check binary
        run: |
          ls -lh nyawa
          file nyawa

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install SQLite
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsqlite3-dev pkg-config
      - name: Test
        run: go test -tags "sqlite_fts5" -count=1 ./internal/index/ ./internal/extract/ ./internal/search/ 2>&1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install SQLite
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsqlite3-dev pkg-config
      - name: Build
        run: go build -tags "sqlite_fts5" -o nyawa ./cmd/nyawa/ 2>&1
      - name: Init DB
        run: ./nyawa init /tmp/e2e.db 2>&1
      - name: Stats
        run: ./nyawa stats /tmp/e2e.db 2>&1 | grep total_memories && echo "OK"