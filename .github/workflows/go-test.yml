name: CI

on:
  push:
    branches: [main, 'phase-*', 'fix-*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.23'
  CGO_ENABLED: '1'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install SQLite
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsqlite3-dev pkg-config
      - name: Build
        run: go build -tags "sqlite_fts5" -v -o nyawa ./cmd/nyawa/ 2>&1
      - name: Check size
        run: |
          test -f nyawa || exit 1
          SIZE=$(stat -c%s nyawa)
          echo "Binary size: $((SIZE / 1024 / 1024))MB"
          test $SIZE -lt $((20 * 1024 * 1024)) && echo "Size OK"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install SQLite
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsqlite3-dev pkg-config
      - name: Test
        run: go test -tags "sqlite_fts5" -v -count=1 . ./internal/index/ ./internal/extract/ ./internal/search/ 2>&1

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install SQLite
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libsqlite3-dev pkg-config
      - name: Build
        run: go build -tags "sqlite_fts5" -v -o nyawa ./cmd/nyawa/ 2>&1
      - name: Init DB
        run: ./nyawa init /tmp/e2e.db 2>&1
      - name: Check stats
        run: |
          ./nyawa stats /tmp/e2e.db 2>&1 | grep "total_memories" && echo "Stats OK"