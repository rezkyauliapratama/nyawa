name: CI

on:
  push:
    branches: [main, 'phase-*', 'fix-*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.23'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install SQLite
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc libsqlite3-dev
      - name: Build all packages
        run: go build -tags "sqlite_fts5" ./...
      - name: Build binary
        run: go build -tags "sqlite_fts5" -o nyawa ./cmd/nyawa/
      - name: Check binary size
        run: |
          SIZE=$(stat -c%s nyawa)
          echo "Binary size: $((SIZE / 1024 / 1024))MB"
          test $SIZE -lt $((20 * 1024 * 1024))

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install SQLite
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc libsqlite3-dev
      - name: Run tests
        run: go test -tags "sqlite_fts5" -v -count=1 -race ./internal/index/ ./internal/extract/ ./internal/search/
      - name: Build race
        run: go build -tags "sqlite_fts5" -race ./...

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install SQLite
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc libsqlite3-dev
      - name: Build
        run: go build -tags "sqlite_fts5" -o nyawa ./cmd/nyawa/
      - name: Init DB
        run: ./nyawa init /tmp/smoke.db
      - name: Check stats
        run: |
          ./nyawa stats /tmp/smoke.db | grep -q "total_memories"
          echo "Stats OK"
      - name: Check namespace
        run: |
          ./nyawa ns /tmp/smoke.db | grep -q "default"
          echo "Namespace OK"