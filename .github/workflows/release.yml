name: Draft Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc libsqlite3-dev
      - name: Build (Linux amd64)
        run: CGO_ENABLED=1 GOARCH=amd64 go build -tags "sqlite_fts5" -ldflags="-s -w" -o nyawa-linux-amd64 ./cmd/nyawa/
      - name: Compress
        run: gzip -k nyawa-linux-amd64
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: true
          files: nyawa-linux-amd64.gz