linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - gosimple
  disable:
    - errcheck
    - ineffassign
    - unused

linters-settings:
  gofmt:
    simplify: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly
